# Team Planner - Production Deployment
# TLS handled by Cloudflare tunnel. Nginx serves HTTP on HOST_PORT.

services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    container_name: teamplanner-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-utilization_planner}
      POSTGRES_USER: ${POSTGRES_USER:-planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-planner}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: teamplanner-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-planner}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-utilization_planner}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3001
    networks:
      - backend
      - frontend
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Frontend (static build served by nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ""
    container_name: teamplanner-frontend
    restart: unless-stopped
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:1.25-alpine
    container_name: teamplanner-nginx
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8087}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend
      - backend
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  uploads_data:
