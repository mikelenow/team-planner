server {
    listen 80;
    server_name _;

    # Frontend (SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Tempo sync fetches from Tempo + Jira and writes many rows; allow it to run
        # longer than the default 30s. (Cloudflare's edge timeout is ~100s, so very large
        # first-time syncs may still need to be scoped to a smaller date range.)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 5M;
    }

    # Uploaded files (logos etc.)
    location /uploads/ {
        proxy_pass http://backend:3001/uploads/;
        proxy_set_header Host $host;
    }
}
