# Team Planner - CI/CD Pipeline
# Deploys to teamplanner.mrnow.at via Cloudflare tunnel on push to main.
#
# Required GitHub secrets:
#   SSH_PRIVATE_KEY  — private key authorized on the target server
#   SSH_HOST         — Cloudflare tunnel SSH hostname (e.g. ssh.mrnow.at)
#   SSH_USER         — SSH username on the target server (e.g. antfarm)
#   DEPLOY_DIR       — absolute path on the server (e.g. /home/antfarm/deployments/team-planner)

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          cat >> ~/.ssh/config <<EOF
          Host deploy-target
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy
        run: |
          ssh deploy-target "DEPLOY_DIR=${{ secrets.DEPLOY_DIR }} bash ${{ secrets.DEPLOY_DIR }}/deployment/deploy.sh"
